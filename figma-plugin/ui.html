<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .brands {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .brand-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 500;
    }
    .wireframe { background: #666; color: #fff; }
    .ifood { background: #E00C2C; color: #fff; }
    .verde { background: #228B22; color: #fff; }
    .azul { background: #0066CC; color: #fff; }
    .roxo { background: #6A0DAD; color: #fff; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary {
      background: #0066CC;
      color: white;
    }
    .btn-secondary {
      background: transparent;
      color: #999;
      border: 1px solid #444;
    }
    #status {
      font-size: 12px;
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }
    .status-progress { background: #2a2a3a; color: #aab; }
    .status-success { background: #1a2e1a; color: #6d6; }
    .status-error { background: #2e1a1a; color: #d66; }
    .info {
      font-size: 11px;
      color: #666;
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Design System White Label</h1>
  <p class="subtitle">
    Cria automaticamente as colecoes de variaveis<br>
    Primitives + Semantic (5 modos)
  </p>

  <div class="brands">
    <span class="brand-tag wireframe">Wireframe</span>
    <span class="brand-tag ifood">iFood</span>
    <span class="brand-tag verde">POS Verde</span>
    <span class="brand-tag azul">POS Azul</span>
    <span class="brand-tag roxo">POS Roxo</span>
  </div>

  <button class="btn-primary" id="createBtn" onclick="create()">
    Criar Variables
  </button>
  <button class="btn-secondary" onclick="parent.postMessage({pluginMessage: {type: 'close'}}, '*')">
    Fechar
  </button>

  <div id="status"></div>

  <p class="info">
    Apos criar, abra Local Variables para ver as colecoes.<br>
    Na colecao Semantic, alterne entre os modos para trocar de marca.
  </p>

  <script>
    function create() {
      document.getElementById('createBtn').disabled = true;
      document.getElementById('createBtn').textContent = 'Criando...';
      parent.postMessage({ pluginMessage: { type: 'create-variables' } }, '*');
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      const el = document.getElementById('status');
      el.style.display = 'block';
      el.textContent = msg.text;

      if (msg.type === 'status') {
        el.className = 'status-progress';
      } else if (msg.type === 'success') {
        el.className = 'status-success';
        document.getElementById('createBtn').textContent = 'Criado!';
      } else if (msg.type === 'error') {
        el.className = 'status-error';
        document.getElementById('createBtn').disabled = false;
        document.getElementById('createBtn').textContent = 'Tentar novamente';
      }
    };
  </script>
</body>
</html>
